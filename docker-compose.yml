services:

  mediathec-db:
    container_name: mediathec-db
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mediathec_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - mediathec-network

  consul:
    image: hashicorp/consul:1.17
    container_name: consul
    ports:
      - "8500:8500"
    command: "agent -dev -client=0.0.0.0"
    healthcheck:
      test: "curl --fail --silent localhost:8500/v1/status/leader | grep . || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - mediathec-network

  members-service:
    image: "evadaumas/mediathec-members-service"
    container_name: member-ms
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mediathec-db:3306/mediathec_db"
      SPRING_CLOUD_CONSUL_HOST: "consul"
    depends_on:
      - mediathec-db
      - consul
    networks:
      - mediathec-network

  book-service:
    image: "evadaumas/mediathec/book-service/book-service:latest"
    container_name: book-ms
    ports:
      - "8086:8086"
    environment:
      SPRING_APPLICATION_NAME: "book-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mediathec-db:3306/mediathec_db"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "root"
      SPRING_CLOUD_CONSUL_HOST: "consul"
      SPRING_CLOUD_CONSUL_PORT: "8500"
    depends_on:
      - mediathec-db
      - consul
    networks:
      - mediathec-network

  loan-service:
    image: "evadaumas/mediathec/loan-service/loan-service:latest"
    container_name: loan-ms
    ports:
      - "8087:8087"
    environment:
      SPRING_APPLICATION_NAME: "loan-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mediathec-db:3306/mediathec_db"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "root"
      SPRING_CLOUD_CONSUL_HOST: "consul"
      SPRING_CLOUD_CONSUL_PORT: "8500"
    depends_on:
      - mediathec-db
      - consul
    networks:
      - mediathec-network

  web-app:
    image: "evadaumas/mediathec-web-app"
    container_name: web-app-ms
    ports:
      - "9011:9011"
    environment:
      SPRING_APPLICATION_NAME: "web-app"
      SPRING_CLOUD_CONSUL_HOST: "consul"
      SPRING_CLOUD_CONSUL_PORT: "8500"
      # --- MODIFICATIONS ICI ---
      SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS: "true"
    depends_on:
      - consul
      - members-service
      - book-service
      - loan-service
    networks:
      - mediathec-network

networks:
  mediathec-network:
    driver: "bridge"