<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediathec - Modifier mon profil</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<nav class="navbar">
    <div class="container nav-container">
        <a th:href="@{/}" class="nav-brand"><span>Mediathec</span></a>
        <div class="nav-links">
            <span class="user-greeting">Bonjour, <span th:text="${userLogin}"></span></span>
            <a th:href="@{/profile}" class="nav-link">Mon profil</a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn-outline" style="background: none; border: none; cursor: pointer; color: #dc3545; padding: 8px 16px; font-size: 16px;">
                    Se déconnecter
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-container">
        <h1>Modifier mon profil</h1>

        <form th:action="@{/members/{id}/edit(id=${member.id})}" th:object="${member}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" th:field="*{username}" class="form-control" required />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" required />
            </div>

            <div class="form-group">
                <label for="password">Nouveau mot de passe (laisser vide pour ne pas changer)</label>
                <input type="password" id="password" th:field="*{password}" class="form-control" />
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a th:href="@{/profile}" class="btn btn-outline">Annuler</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>© 2024 Mediathec - Plateforme de gestion d'emprunts de médias</p>
    </div>
</footer>
</body>
</html>
