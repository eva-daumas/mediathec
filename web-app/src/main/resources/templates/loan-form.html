<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediathec - Nouvel emprunt</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<nav class="navbar">
    <div class="container nav-container">
        <a th:href="@{/}" class="nav-brand">
            <span>Mediathec</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/members}" class="nav-link">Mes membres</a>
            <a th:href="@{/loans}" class="nav-link active">Emprunts</a>
            <div th:if="${userLogin != null}">
                <span class="user-greeting">Bonjour, <span th:text="${userLogin}"></span></span>
                <a th:href="@{/profile}" class="nav-link">Mon profil</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn-outline" style="background: none; border: none; cursor: pointer; color: #dc3545; padding: 8px 16px; font-size: 16px;">
                        Se déconnecter
                    </button>
                </form>
            </div>
            <div th:unless="${userLogin != null}">
                <a th:href="@{/login}" class="btn-outline">Se connecter</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Nouvel emprunt</h1>
    </div>

    <div class="form-container">
        <form th:action="@{/loans}" th:object="${loan}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label class="form-label">ID du membre</label>
                <input type="number" th:field="*{memberId}" class="form-control" placeholder="1" required>
                <small class="form-text">Entrez l'ID du membre</small>
            </div>

            <div class="form-group">
                <label class="form-label">ID du livre</label>
                <input type="number" th:field="*{bookId}" class="form-control" placeholder="1" required>
                <small class="form-text">Entrez l'ID du livre</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Créer l'emprunt
                </button>
                <a th:href="@{/loans}" class="btn btn-outline">
                    <i class="fas fa-arrow-left"></i> Annuler
                </a>
            </div>
        </form>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>© 2024 Mediathec - Plateforme de gestion d'emprunts de médias</p>
    </div>
</footer>
</body>
</html>
