<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediathec - Nouvel emprunt</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="container nav-container">
        <a th:href="@{/home}" class="nav-brand">
            <span>Mediathec</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/admin}" class="nav-link">
                <i class="fas fa-arrow-left"></i> Retour à l'admin
            </a>
            <span class="user-greeting">Bonjour, <span th:text="${userLogin}"></span></span>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-outline"
                        style="background: none; border: none; cursor: pointer; color: #dc3545; padding: 8px 16px; font-size: 16px;">
                    Se déconnecter
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="auth-container" style="max-width: 600px; margin: 40px auto;">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-book"></i>
                    <h2>Nouvel emprunt</h2>
                </div>
                <p>Créez un nouvel emprunt</p>
            </div>
            <div class="auth-body">
                <form th:action="@{/admin/loanDto}" th:object="${loanDto}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="form-group">
                        <label class="form-label">ID du membre *</label>
                        <input type="number" th:field="*{memberId}" class="form-control" required min="1"/>
                        <small class="form-text">Entrez l'ID du membre (ex: 1, 2, 3...)</small>
                    </div>

                    <div class="form-group">
                        <label class="form-label">ID du média *</label>
                        <input type="number" th:field="*{bookId}" class="form-control" required min="1"/>
                        <small class="form-text">Entrez l'ID du média (ex: 1, 2, 3...)</small>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 24px;">
                        <button type="submit" class="btn btn-primary" style="flex: 1;">
                            <i class="fas fa-plus"></i> Créer l'emprunt
                        </button>
                        <a th:href="@{/admin}" class="btn btn-outline" style="flex: 0.5; text-align: center;">
                            Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>© 2024 Mediathec - Plateforme de gestion d'emprunts de médias</p>
    </div>
</footer>

</body>
</html>
