<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediathec - Mes emprunts</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <div class="container nav-container">
        <a th:href="@{/}" class="nav-brand">
            <span>Mediathec</span>
        </a>
        <div class="nav-links">

            <div th:if="${userLogin != null}">
                <span class="user-greeting">Bonjour, <span th:text="${userLogin}"></span></span>
                <a th:href="@{/profile}" class="nav-link">Mon profil</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn-outline" style="background: none; border: none; cursor: pointer; color: #dc3545; padding: 8px 16px; font-size: 16px;">
                        Se déconnecter
                    </button>
                </form>
            </div>
            <div th:unless="${userLogin != null}">
                <a th:href="@{/login}" class="btn-outline">Se connecter</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">


    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-striped" id="loansTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Média</th>
                    <th>Date d'emprunt</th>
                    <th>Date limite</th>
                    <th>Statut</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="loan : ${loans}">
                    <td th:text="${loan.id}">1</td>
                    <td th:text="${loan.bookId}">Livre #1</td>
                    <td th:text="${loan.loanDate}">2026-06-17</td>
                    <td th:text="${loan.returnDate}">-</td>
                    <td>
                        <span class="badge" th:class="${loan.status == 'BORROWED'} ? 'badge-borrowed' : 'badge-returned'">
                            <span th:text="${loan.status == 'BORROWED'} ? 'En cours' : 'Retourné'">BORROWED</span>
                        </span>
                    </td>
                    <td>
                        <!-- Bouton RETOURNER (seulement si emprunt en cours) -->
                        <button th:if="${loan.status == 'BORROWED'}"
                                class="btn btn-sm btn-success"
                                th:onclick="'returnLoan(' + ${loan.id} + ')'">
                            <i class="fas fa-undo-alt"></i> Retourner
                        </button>
                        <span th:unless="${loan.status == 'BORROWED'}" class="text-muted">
                            <i class="fas fa-check-circle" style="color: #28a745;"></i> Déjà retourné
                        </span>
                    </td>
                </tr>
                <tr th:if="${loans == null or loans.isEmpty()}">
                    <td colspan="6" class="text-center">
                        <div class="empty-state">
                            <i class="fas fa-book fa-3x" style="color: rgba(255,255,255,0.2); margin-bottom: 15px;"></i>
                            <h3 style="color: rgba(255,255,255,0.6);">Aucun emprunt</h3>
                            <p style="color: rgba(255,255,255,0.4);">Vous n'avez pas encore d'emprunt</p>
                            <a th:href="@{/home}" class="btn btn-primary" style="margin-top: 15px;">
                                <i class="fas fa-search"></i> Parcourir le catalogue
                            </a>

                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>



<footer class="footer">
    <div class="container">
        <p>© 2024 Mediathec - Plateforme de gestion d'emprunts de médias</p>
    </div>
</footer>

<script>
    // ============================================================
    // 🔽 FONCTION RETOURNER 🔽
    // ============================================================
    function returnLoan(id) {
        if (!confirm('Confirmer le retour de cet emprunt ?')) return;

        const csrfToken = document.querySelector('input[name="_csrf"]')?.value || '';

        fetch('/loans/return/' + id, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': csrfToken
            }
        })
            .then(response => {
                if (response.ok) {
                    alert('✅ Retour effectué avec succès !');
                    // Stocker l'événement pour le temps réel
                    localStorage.setItem('loanUpdated', 'true');
                    window.location.reload();
                } else {
                    alert('❌ Erreur lors du retour');
                }
            })
            .catch(error => {
                console.error('Erreur:', error);
                alert('❌ Erreur lors du retour');
            });
    }

    // ============================================================
    // 🔽 FILTRE EN TEMPS RÉEL 🔽
    // ============================================================
    function filterLoans(event, filter) {
        var rows = document.querySelectorAll('#loansTable tbody tr[data-status]');

        rows.forEach(function(row) {
            var status = row.getAttribute('data-status');

            if (filter === 'all') {
                row.style.display = '';
            } else if (filter === 'borrowed' && status === 'BORROWED') {
                row.style.display = '';
            } else if (filter === 'returned' && status === 'RETURNED') {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });

        var btns = document.querySelectorAll('.tab-btn');
        btns.forEach(function(btn) {
            btn.classList.remove('active');
        });
        if (event && event.target) {
            event.target.classList.add('active');
        }
    }

    // ============================================================
    // 🔥 RAFRAÎCHISSEMENT AUTOMATIQUE (temps réel) 🔥
    // ============================================================
    setInterval(function() {
        const loanUpdated = localStorage.getItem('loanUpdated');
        if (loanUpdated === 'true') {
            localStorage.removeItem('loanUpdated');
            location.reload();
        }
    }, 3000); // Vérifie toutes les 3 secondes
</script>

</body>
</html>
