<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes emprunts</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<nav class="navbar">
    <div class="container nav-container">

        <a th:href="@{/}" class="nav-brand">
            Mediathec
        </a>

        <div class="nav-links">

            <div th:if="${userLogin != null}">
                <span>
                    Bonjour,
                    <span th:text="${userLogin}"></span>
                </span>

                <a th:href="@{/profile}">
                    Mon profil
                </a>
            </div>

        </div>
    </div>
</nav>

<div class="container">

    <h2>Mes emprunts</h2>

    <table class="data-table">

        <thead>
        <tr>
            <th>ID Emprunt</th>
            <th>ID Livre</th>
            <th>Date emprunt</th>
            <th>Date retour</th>
            <th>Statut</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="loan : ${loans}">

            <td th:text="${loan.id}"></td>

            <td th:text="${loan.bookId}"></td>

            <td th:text="${loan.loanDate}"></td>

            <td th:text="${loan.returnDate}"></td>

            <td th:text="${loan.status}"></td>

        </tr>

        <tr th:if="${loans == null || #lists.isEmpty(loans)}">
            <td colspan="5">
                Aucun emprunt trouvé
            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
