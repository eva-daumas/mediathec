<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediathec - Retours</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<nav class="navbar">
    <div class="container nav-container">
        <a th:href="@{/}" class="nav-brand">
            <span>Mediathec</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/loans}" class="nav-link">Emprunts</a>
            <a th:href="@{/returns}" class="nav-link active">Retours</a>
            <div th:if="${userLogin != null}">
                <span class="user-greeting">Bonjour, <span th:text="${userLogin}"></span></span>
                <a th:href="@{/profile}" class="nav-link">Mon profil</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn-outline" style="background: none; border: none; cursor: pointer; color: #dc3545; padding: 8px 16px; font-size: 16px;">
                        Se déconnecter
                    </button>
                </form>
            </div>
            <div th:unless="${userLogin != null}">
                <a th:href="@{/login}" class="btn-outline">Se connecter</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Gestion des retours</h1>
        <p th:if="${loans != null}" class="text-muted">Total : <span th:text="${loans.size()}">0</span> emprunt(s)</p>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-striped" id="loansTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Média</th>
                    <th>Date d'emprunt</th>
                    <th>Date de retour</th>
                    <th>Statut</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="loan : ${loans}">
                    <td th:text="${loan.id}">1</td>
                    <td th:text="${loan.bookId}">Livre #1</td>
                    <td th:text="${loan.loanDate}">2026-06-17</td>
                    <td th:text="${loan.returnDate}">-</td>
                    <td>
                        <span class="badge" th:class="${loan.status == 'BORROWED'} ? 'badge-borrowed' : 'badge-returned'">
                            <span th:text="${loan.status == 'BORROWED'} ? 'En cours' : 'Retourné'">BORROWED</span>
                        </span>
                    </td>
                    <td>
                        <button th:if="${loan.status == 'BORROWED'}"
                                class="btn btn-sm btn-success"
                                th:data-id="${loan.id}"
                                onclick="returnLoan(this.getAttribute('data-id'))">
                            <i class="fas fa-undo-alt"></i> Retourner
                        </button>
                        <span th:unless="${loan.status == 'BORROWED'}" class="text-muted">
                            <i class="fas fa-check-circle" style="color: #28a745;"></i> Retourné
                        </span>
                    </td>
                </tr>
                <tr th:if="${loans == null or loans.isEmpty()}">
                    <td colspan="6" class="text-center">
                        <div class="empty-state">
                            <h1>Gestion des emprunts</h1>
                            <a th:href="@{/returns.html/new}" class="btn btn-primary">
                                <i class="fas fa-plus"></i> Retour
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>© 2024 Mediathec - Plateforme de gestion d'emprunts de médias</p>
    </div>
</footer>

<script>
    let autoRefreshEnabled = true;

    function startAutoRefresh() {
        if (!autoRefreshEnabled) return;
        setTimeout(() => {
            if (document.hidden) {
                startAutoRefresh();
                return;
            }
            const loanUpdated = localStorage.getItem('loanUpdated');
            if (loanUpdated === 'true') {
                localStorage.removeItem('loanUpdated');
                window.location.reload();
            } else {
                startAutoRefresh();
            }
        }, 5000);
    }

    startAutoRefresh();

    function returnLoan(id) {
        if (!confirm('Confirmer le retour de cet emprunt ?')) return;

        const csrfToken = document.querySelector('input[name="_csrf"]')?.value || '';

        fetch('/loans/return/' + id, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': csrfToken
            }
        })
            .then(response => {
                if (response.ok) {
                    localStorage.setItem('loanUpdated', 'true');
                    window.location.reload();
                } else {
                    alert('❌ Erreur lors du retour');
                }
            })
            .catch(error => {
                console.error('Erreur:', error);
                alert('❌ Erreur lors du retour');
            });
    }
</script>
</body>
</html>
