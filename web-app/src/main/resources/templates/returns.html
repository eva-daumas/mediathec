<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediathec - Retours</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<nav class="navbar">
    <div class="container nav-container">
        <a th:href="@{/}" class="nav-brand">
            <span>Mediathec</span>
        </a>
        <div class="nav-links">

            <div th:if="${userLogin != null}">
                <span class="user-greeting">Bonjour, <span th:text="${userLogin}"></span></span>
                <a th:href="@{/profile}" class="nav-link">Mon profil</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn-outline" style="background: none; border: none; cursor: pointer; color: #dc3545; padding: 8px 16px; font-size: 16px;">
                        Se déconnecter
                    </button>
                </form>
            </div>
            <div th:unless="${userLogin != null}">
                <a th:href="@{/login}" class="btn-outline">Se connecter</a>
            </div>
        </div>
    </div>
</nav>



<footer class="footer">
    <div class="container">
        <p>© 2024 Mediathec - Plateforme de gestion d'emprunts de médias</p>
    </div>
</footer>

<script>
    let autoRefreshEnabled = true;

    function startAutoRefresh() {
        if (!autoRefreshEnabled) return;
        setTimeout(() => {
            if (document.hidden) {
                startAutoRefresh();
                return;
            }
            const loanUpdated = localStorage.getItem('loanUpdated');
            if (loanUpdated === 'true') {
                localStorage.removeItem('loanUpdated');
                window.location.reload();
            } else {
                startAutoRefresh();
            }
        }, 5000);
    }

    startAutoRefresh();

    function returnLoan(id) {
        if (!confirm('Confirmer le retour de cet emprunt ?')) return;

        const csrfToken = document.querySelector('input[name="_csrf"]')?.value || '';

        fetch('/loans/return/' + id, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': csrfToken
            }
        })
            .then(response => {
                if (response.ok) {
                    localStorage.setItem('loanUpdated', 'true');
                    window.location.reload();
                } else {
                    alert('❌ Erreur lors du retour');
                }
            })
            .catch(error => {
                console.error('Erreur:', error);
                alert('❌ Erreur lors du retour');
            });
    }
</script>
</body>
</html>
