<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediathec - Connexion</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-logo">
        <h2>Mediathec</h2>
    </div>
    <p>Plateforme de gestion d'emprunts</p>
</div>
<div class="auth-body">
    <h4>Connexion</h4>

            <!-- Affichage des erreurs de connexion -->
            <div th:if="${param.error}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i> Email ou mot de passe incorrect
            </div>

            <div th:if="${param.logout}" class="alert alert-success">
                <i class="fas fa-check-circle"></i> Vous avez été déconnecté avec succès
            </div>

            <form th:action="@{/login}" method="post">
                <!-- Token CSRF pour la sécurité -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="username" class="form-control" placeholder="exemple@email.com" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    <div class="text-right" style="text-align: right; margin-top: 8px;">
                        <a th:href="@{/forgot-password}" class="text-primary" style="color: #2c7da0; font-size: 13px;">Mot de passe oublié ?</a>
                    </div>
                </div>

                <div class="form-group">
                    <button class="btn btn-primary" type="submit" style="width: 100%;">
                        <i class="fas fa-sign-in-alt"></i> Se connecter
                    </button>
                </div>

                <div class="text-center" style="text-align: center; margin-top: 20px;">
                    <p class="text-muted" style="color: #78909c;">
                        Pas encore de compte ?
                        <a th:href="@{/signup}" class="text-primary" style="color: #2c7da0; text-decoration: none; font-weight: 600;">Créer un compte</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
