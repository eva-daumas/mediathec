<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediathec - Modifier un média</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="container nav-container">
        <a th:href="@{/home}" class="nav-brand">
            <span>Mediathec</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/admin}" class="nav-link">
                <i class="fas fa-arrow-left"></i> Retour à l'admin
            </a>
            <span class="user-greeting">Bonjour, <span th:text="${userLogin}"></span></span>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-outline"
                        style="background: none; border: none; cursor: pointer; color: #dc3545; padding: 8px 16px; font-size: 16px;">
                    Se déconnecter
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="auth-container" style="max-width: 600px; margin: 40px auto;">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-edit"></i>
                    <h2>Modifier un média</h2>
                </div>
                <p>Modifiez les informations du média</p>
            </div>
            <div class="auth-body">
                <form th:action="@{/admin/medias/update/{id}(id=${media.id})}" th:object="${media}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" th:field="*{id}"/>

                    <div class="form-group">
                        <label class="form-label">Titre *</label>
                        <input type="text" th:field="*{title}" class="form-control" required/>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Auteur *</label>
                        <input type="text" th:field="*{author}" class="form-control" required/>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Catégorie *</label>
                        <select th:field="*{category}" class="form-control" required>
                            <option value="Livre"> Livre</option>
                            <option value="Film"> Film</option>
                            <option value="Jeu"> Jeu</option>
                            <option value="Musique"> Musique</option>
                            <option value="Autre"> Autre</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">URL de l'image (couverture)</label>
                        <input type="text" th:field="*{coverImage}" class="form-control"
                               placeholder="/assets/books/titre.jpg"/>
                        <small class="form-text">Exemple : /assets/books/harry-potter.jpg</small>
                    </div>

                    <div class="form-group" style="display: flex; gap: 20px; align-items: center;">
                        <label class="form-label" style="margin: 0;">Disponible :</label>
                        <input type="checkbox" th:field="*{available}"/>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 24px;">
                        <button type="submit" class="btn btn-primary" style="flex: 1;">
                            <i class="fas fa-save"></i> Enregistrer
                        </button>
                        <a th:href="@{/admin}" class="btn btn-outline" style="flex: 0.5; text-align: center;">
                            Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>© 2024 Mediathec - Plateforme de gestion d'emprunts de médias</p>
    </div>
</footer>

</body>
</html>
